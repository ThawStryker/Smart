    <meta
      property="og:title"
      content="EdgeSpark App"
    />
    <meta
      property="og:description"
      content="EdgeSpark is the harness platform for AI agents. Build and deploy full-stack apps at the edge with guardrails, built-in auth and data, and zero-config infrastructure."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EdgeSpark" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EdgeSpark App" />
    <meta
      name="twitter:description"
      content="EdgeSpark is the harness platform for AI agents. Build and deploy full-stack apps at the edge with guardrails, built-in auth and data, and zero-config infrastructure."
    />
    <meta name="twitter:image" content="https://cdn.edgespark.dev/assets/og-banner.png" />
    <link rel="icon" href="/favicon.png" />
    <title>EdgeSpark App</title>
    <style>#es-watermark{display:none!important}</style>
  </head>
  <body>
    <script>
      (function(){
        var h = window.location.hostname;
        if (h.endsWith('.torresx.cn') && h !== 'leading-stallion-5780.edgespark.app') {
          var sub = h.replace('.torresx.cn','');
          window.location.replace('/api/public/smart/serve/'+sub+window.location.pathname);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function(){
        function rm(){ var w=document.getElementById('es-watermark'); if(w)w.remove(); }
        rm();
        new MutationObserver(rm).observe(document.body||document.documentElement,{childList:true,subtree:true});
        document.addEventListener('DOMContentLoaded',rm);
        var i=setInterval(rm,500);
        setTimeout(function(){clearInterval(i)},5000);
      })();
    </script>
  </body>
</html>
